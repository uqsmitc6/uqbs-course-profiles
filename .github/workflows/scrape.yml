name: UQ Course Profile Scrape

on:
  # Weekly schedule: every Sunday at 9pm AEST (11:00 UTC)
  # Scheduled runs are UQBS-only (safe default — does not affect all-of-UQ data)
  schedule:
    - cron: '0 11 * * 0'

  # Manual trigger with options
  workflow_dispatch:
    inputs:
      semester:
        description: 'Semester code to scrape (e.g. 7620 for Sem 1 2026). Leave blank for all current.'
        required: false
        type: string
      courses:
        description: 'Specific course codes (space-separated, e.g. MGTS1601 ACCT1101). Leave blank for all.'
        required: false
        type: string
      max_courses:
        description: 'Max courses to scrape (for testing). Leave blank for all.'
        required: false
        type: string
      all_uq:
        description: 'Scrape all of UQ (not just UQBS). Uses JacSON index as course list.'
        required: false
        type: boolean
        default: false

# Grant write permission so the workflow can push commits
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: |
          ARGS=""
          if [ -n "${{ inputs.semester }}" ]; then
            ARGS="$ARGS --semester ${{ inputs.semester }}"
          fi
          if [ -n "${{ inputs.courses }}" ]; then
            ARGS="$ARGS --courses ${{ inputs.courses }}"
          fi
          if [ -n "${{ inputs.max_courses }}" ]; then
            ARGS="$ARGS --max ${{ inputs.max_courses }}"
          fi
          if [ "${{ inputs.all_uq }}" = "true" ]; then
            ARGS="$ARGS --all-uq"
          fi
          python scraper/scrape.py $ARGS

      - name: Rebuild site manifest
        if: always()
        run: |
          if [ -d "profiles" ] && [ "$(find profiles/ -name '*.json' 2>/dev/null)" ]; then
            python scraper/build_manifest.py
          else
            echo "No profiles — skipping manifest regen"
          fi

      - name: Rebuild AoL overlay
        if: always()
        run: |
          if [ -f "taxonomy/aol-template.csv" ]; then
            python scraper/import_aol.py
          else
            echo "No AoL CSV — skipping"
          fi

      - name: Commit and push updated profiles
        if: always()
        run: |
          git config user.name "UQ Scraper Bot"
          git config user.email "uq-scraper[bot]@users.noreply.github.com"

          # Only add profiles if the directory has content
          if [ -d "profiles" ] && [ "$(find profiles/ -name '*.json' 2>/dev/null)" ]; then
            git add profiles/ docs/assets/manifest.json docs/assets/manifest-all.json taxonomy/ docs/taxonomy/
            if git diff --cached --quiet; then
              echo "No changes to commit"
            else
              TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
              PROFILE_COUNT=$(find profiles/ -name "*.json" | wc -l)
              git commit -m "Scrape update: ${PROFILE_COUNT} profiles as at ${TIMESTAMP}"
              git push
            fi
          else
            echo "No profile files found — skipping commit"
          fi

      - name: Upload scrape logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
