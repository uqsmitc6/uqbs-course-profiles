<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UQBS Course Profile Viewer</title>
  <link rel="stylesheet" href="./assets/styles.css">
  <script>
    // Apply saved theme + colour mode before first paint to avoid FOUC
    (function () {
      try {
        var t = localStorage.getItem("uqbs-theme") || "classic";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "classic");
      }
      try {
        var m = localStorage.getItem("uqbs-color-mode") || "auto";
        if (m !== "auto") document.documentElement.setAttribute("data-color-mode", m);
      } catch (e) { /* ignore */ }
    })();
  </script>
</head>
<body>
  <header class="site">
    <h1>UQBS Course Profile Viewer</h1>
    <nav>
      <a href="index.html" class="active">Courses</a>
      <a href="program.html">Programs</a>
      <a href="https://github.com/uqsmitc6/uqbs-course-profiles" target="_blank" rel="noopener">Repository ↗</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme"
              title="Switch between Classic and Fun themes">
        <span class="tt-icon" aria-hidden="true">◐</span>
        <span class="tt-label">Classic</span>
      </button>
      <button id="mode-toggle" class="mode-toggle" type="button" aria-label="Switch colour mode"
              title="Switch between Auto, Light, and Dark">
        <span class="mt-icon" aria-hidden="true">☾</span>
        <span class="mt-label">Auto</span>
      </button>
    </nav>
  </header>

  <main>
    <div class="stat-bar">
      <div class="stat"><b id="course-count">0</b><span>courses shown</span></div>
      <div class="stat" id="meta-info">Loading…</div>
      <div class="stat bulk-actions" style="margin-left:auto">
        <button id="export-csv" class="btn-link" type="button" title="Download filtered courses as CSV">Export CSV ↓</button>
        <button id="export-zip-md" class="btn-link" type="button" title="Download filtered courses as a ZIP of Markdown files">ZIP (Markdown) ↓</button>
        <button id="export-zip-json" class="btn-link" type="button" title="Download filtered courses as a ZIP of raw JSON files">ZIP (JSON) ↓</button>
        <span id="bulk-status" class="small muted" aria-live="polite"></span>
      </div>
    </div>

    <div class="filters">
      <div>
        <label for="search">Search code or title</label>
        <input id="search" type="search" placeholder="e.g. MGTS1601 or Strategy">
      </div>
      <div>
        <label for="filter-program">Program</label>
        <select id="filter-program"><option value="">Any program</option></select>
      </div>
      <div>
        <label for="filter-level">Study level</label>
        <select id="filter-level"><option value="">Any level</option></select>
      </div>
      <div>
        <label for="filter-mode">Mode</label>
        <select id="filter-mode"><option value="">Any mode</option></select>
      </div>
      <div>
        <label for="filter-location">Location</label>
        <select id="filter-location"><option value="">Any location</option></select>
      </div>
    </div>

    <div class="table-wrap">
      <table class="courses">
        <thead>
          <tr>
            <th data-sort="course_code">Code</th>
            <th data-sort="course_title">Title</th>
            <th data-sort="study_level">Level</th>
            <th data-sort="units">Units</th>
            <th data-sort="attendance_mode">Mode</th>
            <th data-sort="location">Location</th>
            <th>Programs</th>
          </tr>
        </thead>
        <tbody id="courses-body">
          <tr><td colspan="7" class="loading">Loading profiles…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <footer class="site">
    UQBS Course Profile Viewer · Data scraped from course-profiles.uq.edu.au · Built with the UQBS course profile scraper
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" referrerpolicy="no-referrer"></script>
  <script src="./assets/app.js"></script>
  <script>window.UQBS.initBrowser();</script>
</body>
</html>
